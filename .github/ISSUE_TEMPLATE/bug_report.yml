name: Bug report
description: Report a reproducible problem in codex-profile-manager
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Never include `auth.json`, access tokens, refresh tokens, device-login codes, or private session content.
  - type: input
    id: version
    attributes:
      label: codex-profile-manager version
      description: Output of `codexpm version`
      placeholder: codex-profile-manager 1.0.0
    validations:
      required: true
  - type: input
    id: codex_version
    attributes:
      label: Codex CLI version
      description: Output of your original Codex binary with `--version`
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Ubuntu 24.04, Bash 5.2
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Use placeholder profile names and redact private paths when needed.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted `codexpm doctor` output
      description: Remove any data you do not intend to publish. Never attach authentication files.
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: I confirmed that this report contains no credentials, tokens, device codes, or private session content.
          required: true
