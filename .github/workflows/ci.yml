name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax
        run: bash -n install.sh uninstall.sh bin/* lib/*.sh tests/*.sh
      - name: ShellCheck
        run: shellcheck -x -e SC1090,SC1091,SC2034,SC2154 install.sh uninstall.sh bin/* lib/*.sh tests/*.sh
      - name: Integration tests
        run: bash tests/test_codexpm.sh
