name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure ShellCheck is available
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y shellcheck >/dev/null
          fi
          shellcheck --version
      - name: Bash syntax
        run: bash -n install.sh uninstall.sh bin/* lib/*.sh tests/*.sh
      - name: ShellCheck
        run: |
          shellcheck -x -e SC1090,SC1091,SC2034,SC2154 \
            install.sh uninstall.sh bin/* lib/*.sh tests/*.sh
      - name: Reject tracked credentials and runtime state
        run: |
          if git ls-files | grep -E '(^|/)auth\.json$|(^|/)\.codex-[^/]+/|(^|/)\.codex/'; then
            echo "Tracked Codex credentials or runtime state detected." >&2
            exit 1
          fi
      - name: Integration tests
        run: |
          for test_file in tests/test_*.sh; do
            echo "Running $test_file"
            bash "$test_file"
          done
